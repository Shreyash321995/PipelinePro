apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpipeline-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudpipeline
  template:
    metadata:
      labels:
        app: cloudpipeline
    spec:
      containers:
      - name: app
        image: shreyash32951/cloudpipeline-app
        ports:
        - containerPort: 3000
